<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      /* 표 전체 크기와 기본 테두리 */
      #list {
        width: 600px;
        border: 1px solid black;
        border-collapse: collapse;
      }
      /* 셀 공통 스타일 */
      #list td,
      #list th {
        border: 1px solid black;
        text-align: center;
      }
      /* 헤더 행 스타일 */
      #list > thead > tr {
        color: yellow;
        background-color: purple;
      }
    </style>
    <div id="app">
      <table id="list">
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody id="contacts">
          <!-- v-for: contacts 배열을 반복하여 행(tr) 생성 -->
          <!-- :key는 각 행을 고유하게 식별(성능/정확한 갱신에 필요) -->
          <tr v-for="contact in  contacts" :key="contact.no">
            <!-- 텍스트 보간법으로 값 출력 -->
            <td>{{contact.no}}</td>
            <td>{{contact.name}}</td>
            <td>{{contact.tel}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Vue 라이브러리 로드 -->
    <script src="https://unpkg.com/vue"></script>
    <script>
      // Vue 앱 생성 후 #app에 마운트
      let vm = Vue.createApp({
        name: 'App',
        data() {
          // 화면에 사용할 연락처 목록(배열)
          return {
            contacts: [
              { no: 1011, name: 'RM', tel: '010-3456-8299' },
              { no: 1012, name: '정국', tel: '010-3456-8298' },
              { no: 1013, name: '제이홈', tel: '010-3456-8297' },
              { no: 1014, name: '슈가', tel: '010-3456-8296' },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
