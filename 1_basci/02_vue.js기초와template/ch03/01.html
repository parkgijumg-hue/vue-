<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <!--
    Vue.js 와 MVVM패턴

      - Model - View - ViewModel
      - Model 변화를 View에 반영
      - View는 Model의 변화를 실시간으로 반영
      - ViewModel은 뷰와 모델 사이의 중개자 역할을 합니다.
    -->

          <!-- Vue 디렉티브
      - v-로 시작하는 속성
      - HTML 요소와 관련된 작업을 지정

      v-text: 텍스트 렌더링
      v-html: HTML 렌더링
      v-bind: 속성 바인딩
      v-on: 이벤트 핸들러
      v-model: 양방향 데이터 바인딩
      v-if, v-else-if, v-else: 조건부 렌더링
      v-for: 반복문
      v-show: 요소 표시 여부
    -->
      <!-- Vue 템플릿: message 값이 화면에 바인딩됨 -->
      <!-- {{ }}는 텍스트 보간법(데이터를 문자열로 출력) , 이어쓰기 가능 -->
      <h2>{{message}}</h2>
      <!-- v-text 랜더링 -->
      <!-- v-text는 요소의 텍스트 내용을 통째로 바꿈 -->
      <h2 v-text="message"></h2>
    </div>
    <!-- Vue 라이브러리 로드 (CDN) -->
    <script type="text/javascript" src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
      // 화면에 표시할 데이터 모델
      var model = { message: 'Hello Vue3!' };
      // Vue 앱 생성 → data에서 model을 반환 → #app에 마운트
      var vm = Vue.createApp({
        name: 'App',
        data() {
          // data는 객체를 반환해야 하며, 여기서는 model을 그대로 사용
          // 컴포넌트의 반응형 데이터 정의
          //  data() 함수가 반환하는 객체의 속성들은 vue의 반응형 시스템에 의해 관리된다.
          // ->반환되는 model 객체의 message 속성값이 수정되면 v-text="message" /  {{message}}  요소가 수정됨
          return model;
        },
      }).mount('#app');
    </script>
  </body>
</html>
